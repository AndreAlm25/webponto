version: '3.8'

services:
  # ===== FRONTEND (Next.js) - DEV MODE =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: webponto_frontend_dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
      - WATCHPACK_POLLING=true  # Hot reload no Docker
    depends_on:
      - backend
    networks:
      - webponto_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    command: npm run dev

  # ===== BACKEND (NestJS) - DEV MODE =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: webponto_backend_dev
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://webponto:webponto123@postgres:5432/webponto_db
      - JWT_SECRET=change-this-super-secret-key-in-production
      - JWT_EXPIRES_IN=7d
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_USE_SSL=false
      - COMPREFACE_API_URL=http://compreface-api:8080
      - COMPREFACE_API_KEY=00000000-0000-0000-0000-000000000002
      - COMPREFACE_THRESHOLD=0.9
      - COMPREFACE_DET_PROB=0.2
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
      - minio
      - compreface-api
    networks:
      - webponto_network
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    restart: unless-stopped
    command: npm run start:dev

  # ===== BANCO DE DADOS =====
  postgres:
    image: postgres:15-alpine
    container_name: webponto_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=webponto
      - POSTGRES_PASSWORD=webponto123
      - POSTGRES_DB=webponto_db
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=pt_BR.UTF-8 --lc-ctype=pt_BR.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webponto_network
    restart: unless-stopped

  # ===== REDIS (Cache + Filas) =====
  redis:
    image: redis:7-alpine
    container_name: webponto_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - webponto_network
    restart: unless-stopped

  # ===== MINIO (Armazenamento S3) =====
  minio:
    image: minio/minio:latest
    container_name: webponto_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - webponto_network
    restart: unless-stopped

  # ===== COMPREFACE STACK (Reconhecimento Facial) =====
  
  # CompreFace - PostgreSQL Database
  compreface-postgres-db:
    image: postgres:11.5
    container_name: webponto_compreface_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frs
    volumes:
      - compreface_postgres_data:/var/lib/postgresql/data
    networks:
      - webponto_network
    restart: unless-stopped

  # CompreFace - Core (ML Engine)
  compreface-core:
    image: exadel/compreface-core:1.2.0
    container_name: webponto_compreface_core
    environment:
      ML_PORT: 3000
    networks:
      - webponto_network
    restart: unless-stopped

  # CompreFace - API
  compreface-api:
    image: exadel/compreface-api:1.2.0
    container_name: webponto_compreface_api
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-postgres-db:5432/frs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: dev
      API_JAVA_OPTS: -Xmx8g
      SAVE_IMAGES_TO_DB: "true"
      MAX_FILE_SIZE: 5MB
      MAX_REQUEST_SIZE: 10MB
    depends_on:
      - compreface-postgres-db
      - compreface-core
    networks:
      - webponto_network
    restart: unless-stopped

  # CompreFace - Admin (Backend)
  compreface-admin:
    image: exadel/compreface-admin:1.2.0
    container_name: webponto_compreface_admin
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-postgres-db:5432/frs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: dev
      ADMIN_JAVA_OPTS: -Xmx8g
      MAX_FILE_SIZE: 5MB
      MAX_REQUEST_SIZE: 10MB
      ENABLE_EMAIL_SERVER: "false"
    depends_on:
      - compreface-postgres-db
      - compreface-api
    networks:
      - webponto_network
    restart: unless-stopped

  # CompreFace - Frontend (Interface Web - Nginx)
  compreface-fe:
    image: exadel/compreface-fe:1.2.0
    container_name: webponto_compreface_fe
    ports:
      - "8000:80"
    environment:
      CLIENT_MAX_BODY_SIZE: 10m
      PROXY_READ_TIMEOUT: 60s
      PROXY_CONNECT_TIMEOUT: 10s
    depends_on:
      - compreface-api
      - compreface-admin
    networks:
      - webponto_network
    restart: unless-stopped

networks:
  webponto_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  compreface_postgres_data:
    driver: local
  backend_node_modules:
    driver: local
