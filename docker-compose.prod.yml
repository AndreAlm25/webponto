version: '3.8'

# ============================================================
# docker-compose PRODUÇÃO — WebPonto
# ============================================================
# O que este arquivo INCLUI:
#   - frontend (Next.js)
#   - backend  (NestJS)
#   - redis    (cache interno)
#   - postgres (banco dedicado do WebPonto)
#
# O que este arquivo NÃO inclui (já existe no servidor/rede):
#   - MinIO               (externo — variáveis MINIO_* no .env.prod)
#   - Portainer / Traefik (já rodando no servidor)
#   - CompreFace          (rodando no servidor de dev 192.168.18.44:8080)
#
# Uso:
#   cp .env.prod.example .env.prod
#   # edite .env.prod com os valores reais
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# ============================================================

services:

  # ===== FRONTEND (Next.js standalone) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
        - NEXT_PUBLIC_COMPREFACE_URL=${NEXT_PUBLIC_COMPREFACE_URL}
        - NEXT_PUBLIC_COMPREFACE_API_KEY=${NEXT_PUBLIC_COMPREFACE_API_KEY}
        - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
    container_name: webponto_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - BACKEND_URL=http://backend:4000
    depends_on:
      - backend
    networks:
      - webponto_network
      - network_public
    labels:
      # Traefik labels — ajuste o domínio conforme necessário
      - "traefik.enable=true"
      - "traefik.docker.network=network_public"
      - "traefik.http.routers.webponto-front.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.webponto-front.entrypoints=websecure"
      - "traefik.http.routers.webponto-front.tls=true"
      - "traefik.http.services.webponto-front.loadbalancer.server.port=3000"

  # ===== BACKEND (NestJS) =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webponto_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      # Banco principal (container dedicado)
      - DATABASE_URL=${DATABASE_URL}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      # MinIO externo
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      # CompreFace (servidor de dev na rede local — 192.168.18.44:8080)
      - COMPREFACE_API_URL=http://192.168.18.44:8080
      - COMPREFACE_API_KEY=${COMPREFACE_API_KEY}
      - COMPREFACE_THRESHOLD=${COMPREFACE_THRESHOLD:-0.85}
      - COMPREFACE_DET_PROB=${COMPREFACE_DET_PROB:-0.2}
      # Redis interno
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS}
      # SMTP sistema (recuperação de senha)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - APP_URL=${APP_URL}
      # Sentry (opcional)
      - SENTRY_DSN=${SENTRY_DSN:-}
      # URL pública do MinIO (para links de arquivos)
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-}
      # Bucket MinIO
      - S3_BUCKET=${S3_BUCKET:-webponto}
      - MINIO_BUCKET=${MINIO_BUCKET:-webponto}
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - postgres
      - redis
    networks:
      - webponto_network
      - network_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=network_public"
      - "traefik.http.routers.webponto-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.webponto-api.entrypoints=websecure"
      - "traefik.http.routers.webponto-api.tls=true"
      - "traefik.http.services.webponto-api.loadbalancer.server.port=4000"

  # ===== POSTGRESQL DEDICADO (banco principal do WebPonto) =====
  postgres:
    image: postgres:16-alpine
    container_name: webponto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-webponto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-webponto_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webponto_network

  # ===== REDIS (cache interno — leve, não precisa ser externo) =====
  redis:
    image: redis:7-alpine
    container_name: webponto_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - webponto_network


networks:
  webponto_network:
    driver: bridge
  network_public:
    external: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
